<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#00130c"/>
  <!-- Dollar coin -->
  <circle cx="256" cy="220" r="130" fill="#c9991e" opacity="0.15"/>
  <circle cx="256" cy="220" r="118" fill="none" stroke="#c9991e" stroke-width="8"/>
  <!-- Golf flag pole -->
  <line x1="282" y1="100" x2="282" y2="380" stroke="#f0bf30" stroke-width="10" stroke-linecap="round"/>
