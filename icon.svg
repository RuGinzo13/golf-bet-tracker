  <!-- Golf ball -->
  <circle cx="210" cy="380" r="36" fill="#f5edd5"/>
  <circle cx="200" cy="368" r="4" fill="#c0b8a8" opacity="0.5"/>
  <circle cx="220" cy="372" r="4" fill="#c0b8a8" opacity="0.5"/>
  <circle cx="210" cy="388" r="4" fill="#c0b8a8" opacity="0.5"/>
  <circle cx="196" cy="385" r="3" fill="#c0b8a8" opacity="0.5"/>
  <circle cx="224" cy="383" r="3" fill="#c0b8a8" opacity="0.5"/>
  <!-- Ground line -->
  <line x1="80" y1="416" x2="432" y2="416" stroke="#1a6030" stroke-width="6" stroke-linecap="round"/>
</svg>
