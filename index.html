<body>
<div id="root"></div>
<script>
// ── Storage (localStorage) ────────────────────────────────────────────────────
var storage={
  get:function(k){try{var v=localStorage.getItem('gbt_'+k);return Promise.resolve(v!==null?{key:k,value:v}:null);}catch(e){return Promise.resolve(null);}},
  set:function(k,v){try{localStorage.setItem('gbt_'+k,v);return Promise.resolve({key:k,value:v});}catch(e){return Promise.resolve(null);}},
  del:function(k){try{localStorage.removeItem('gbt_'+k);return Promise.resolve(true);}catch(e){return Promise.resolve(false);}},
  list:function(prefix){try{var keys=[];for(var i=0;i<localStorage.length;i++){var key=localStorage.key(i);if(key&&key.startsWith('gbt_'+prefix))keys.push(key.slice(4));}return Promise.resolve({keys:keys});}catch(e){return Promise.resolve({keys:[]});}}
};

// ── State ─────────────────────────────────────────────────────────────────────
var loggedIn=false,profile=null,loginErr='';
var TAB='setup',numP=2,nM='',ntT=null;
var showNewP=[false,false,false,false];
var editingRoundId=null;
var csTimer=null;
// ── Golf Course API ───────────────────────────────────────────────────────────
var API_KEY='T5G624EKF3RWOEP3M3UICPKAVI'; // golfcourseapi.com key
var PROXY_URL='https://golf-proxy.rmg-1313.workers.dev'; // Cloudflare Worker proxy
var API_BASE='https://api.golfcourseapi.com/v1';
var courseTeeSets=[],courseTeeIdx=0,lastCourseId='',courseCache={};
var sG=[],rounds=[];
var P=[{name:'',hcp:10,on:true},{name:'',hcp:14,on:true},{name:'',hcp:6,on:false},{name:'',hcp:20,on:false}];
var cN='';
var DEF=[{n:1,par:4,hcp:1},{n:2,par:5,hcp:13},{n:3,par:3,hcp:7},{n:4,par:4,hcp:3},{n:5,par:4,hcp:11},{n:6,par:5,hcp:5},{n:7,par:3,hcp:17},{n:8,par:4,hcp:9},{n:9,par:4,hcp:15},{n:10,par:4,hcp:2},{n:11,par:5,hcp:14},{n:12,par:3,hcp:8},{n:13,par:4,hcp:4},{n:14,par:4,hcp:12},{n:15,par:5,hcp:6},{n:16,par:3,hcp:18},{n:17,par:4,hcp:10},{n:18,par:4,hcp:16}];
var C=DEF.map(function(h){return Object.assign({},h);});
var GR=Array(4).fill(0).map(function(){return Array(18).fill('');});
var BT={
  nassau:{on:true,mus:[{p1:0,p2:1,front:5,back:5,tot:10}]},
  match:{on:false,mus:[{p1:0,p2:1,stake:10}]},
  wolf:{on:false,stake:2},s666:{on:false,stake:5},s531:{on:false,stake:1},
  p3c:{on:false,birdie:10,par:5,bogey:5},dots:{on:false,fwy:1,grn:1},
  junk:{on:false,greenie:2,sandy:2,barky:2,polie:2}
};
var WD=Array(18).fill(0).map(function(){return{dec:null};});
var DT=Array(18).fill(0).map(function(){return Array(4).fill(0).map(function(){return{f:false,g:false};});});
var JK=Array(18).fill(0).map(function(){return Array(4).fill(0).map(function(){return{gr:false,sa:false,ba:false,po:false};});});
var P3C=Array(18).fill(0).map(function(){return{cp:null,tp:false};});
var RF={roundPayer:null,roundAmt:0,bookPayer:null,bookAmt:0,feeExclude:[]};

// ── Persistence ───────────────────────────────────────────────────────────────
async function ldAll(){
  try{var g=await storage.get('sGolfers');if(g)sG=JSON.parse(g.value);}catch(e){}
  try{var pr=await storage.get('prof');if(pr)profile=JSON.parse(pr.value);}catch(e){}
  try{var rl=await storage.list('rnd:');if(rl&&rl.keys&&rl.keys.length){rounds=[];for(var k of rl.keys){try{var r=await storage.get(k);if(r)rounds.push(JSON.parse(r.value));}catch(e){}}}rounds.sort(function(a,b){return b.ts-a.ts;});}catch(e){}
}
async function svG(){try{await storage.set('sGolfers',JSON.stringify(sG));}catch(e){}}
async function svRound(){
  var a=ais(),ov=overall();
  var newState=JSON.parse(JSON.stringify({C:C,GR:GR,BT:BT,DT:DT,JK:JK,P3C:P3C,WD:WD,P:P,cN:cN,numP:numP,RF:RF}));
  var results={};a.forEach(function(i){results[pn(i)]=Math.round(ov[i]||0);});
  if(editingRoundId){
    // Update existing round in-place
    var idx=rounds.findIndex(function(r){return r.id===editingRoundId;});
    if(idx>=0){
      rounds[idx].state=newState;
      rounds[idx].results=results;
      rounds[idx].players=a.map(pn);
      rounds[idx].hcps=a.map(function(i){return P[i].hcp;});
      rounds[idx].course=cN||rounds[idx].course;
      try{await storage.set(rounds[idx].id,JSON.stringify(rounds[idx]));showN('Round updated!');}catch(e){showN('Save failed');}
    }
  }else{
    var ts=Date.now();
    var rd={
      id:'rnd:'+ts,ts:ts,
      date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
      course:cN||'Unknown',
      players:a.map(pn),hcps:a.map(function(i){return P[i].hcp;}),
      results:results,
      state:newState
    };
    try{await storage.set(rd.id,JSON.stringify(rd));rounds.unshift(rd);editingRoundId=rd.id;showN('Round saved!');}catch(e){showN('Save failed');}
  }
  render();
}
function loadRound(id){
  var rd=rounds.find(function(r){return r.id===id;});
  if(!rd||!rd.state){showN('No full state saved for this round');return;}
  var s=rd.state;
  C=JSON.parse(JSON.stringify(s.C));
  GR=JSON.parse(JSON.stringify(s.GR));
  BT=JSON.parse(JSON.stringify(s.BT));
  DT=JSON.parse(JSON.stringify(s.DT));
  JK=JSON.parse(JSON.stringify(s.JK));
  P3C=JSON.parse(JSON.stringify(s.P3C));
  WD=JSON.parse(JSON.stringify(s.WD));
  P=JSON.parse(JSON.stringify(s.P));
  RF=s.RF?JSON.parse(JSON.stringify(s.RF)):{roundPayer:null,roundAmt:0,bookPayer:null,bookAmt:0,feeExclude:[]};
  cN=s.cN||'';numP=s.numP||2;
  showNewP=[false,false,false,false];
  editingRoundId=rd.id;
  invalidateCalcCache();
  TAB='results';
  render();
}
function newRound(){
  editingRoundId=null;
  C=DEF.map(function(h){return Object.assign({},h);});
  GR=Array(4).fill(0).map(function(){return Array(18).fill('');});
  DT=Array(18).fill(0).map(function(){return Array(4).fill(0).map(function(){return{f:false,g:false};});});
  JK=Array(18).fill(0).map(function(){return Array(4).fill(0).map(function(){return{gr:false,sa:false,ba:false,po:false};});});
  P3C=Array(18).fill(0).map(function(){return{cp:null,tp:false};});
  WD=Array(18).fill(0).map(function(){return{dec:null};});
  RF={roundPayer:null,roundAmt:0,bookPayer:null,bookAmt:0,feeExclude:[]};
  invalidateCalcCache();
  TAB='scores';
  render();
}
async function deleteRound(id){
  if(!confirm('Delete this round?'))return;
  try{await storage.del(id);}catch(e){}
  rounds=rounds.filter(function(r){return r.id!==id;});
  render();
}
function showN(m){nM=m;var e=document.getElementById('ntf');if(e){e.textContent=m;e.className='ntf on';}clearTimeout(ntT);ntT=setTimeout(function(){nM='';var e=document.getElementById('ntf');if(e)e.className='ntf';},3000);}

// ── Helpers ───────────────────────────────────────────────────────────────────
var _nsCache=null,_netCache=null;
function invalidateCalcCache(){_nsCache=null;_netCache=null;}
function ais(){return P.reduce(function(a,p,i){return p.on?a.concat(i):a;},[]); }
function minH(){var a=ais();return a.length?Math.min.apply(null,a.map(function(i){return P[i].hcp;})):0;}
function hSt(d,h){return Math.floor(d/18)+(d%18>0&&h<=d%18?1:0);}
function NS(){
  if(_nsCache)return _nsCache;
  _nsCache=P.map(function(p,i){if(!p.on)return Array(18).fill(0);var d=Math.max(0,p.hcp-minH());return C.map(function(h){return hSt(d,h.hcp);});});
  return _nsCache;
}
function NET(){
  if(_netCache)return _netCache;
  var ns=NS();
  _netCache=P.map(function(p,i){if(!p.on)return Array(18).fill(null);return C.map(function(h,hi){var g=parseInt(GR[i][hi]);return isNaN(g)?null:g-ns[i][hi];});});
  return _netCache;
}
function pn(i){return((P[i]&&P[i].name)||'').trim()||'P'+(i+1);}
function sC(d){return d<=-2?'#f5a030':d===-1?'#ff3030':d===0?'#60e030':d===1?'#30aaff':'#c060ff';}
function fm(v){v=Math.round(v);return v===0?'$0':(v>0?'+':'-')+'$'+Math.abs(v);}
function nassauStrokes(p1i,p2i){
  if(!P[p1i]||!P[p2i])return'';
  var mh=minH(),s1=Math.max(0,P[p1i].hcp-mh),s2=Math.max(0,P[p2i].hcp-mh);
  if(s1===s2)return'Even handicaps — no strokes given';
  var giver=s1>s2?{n:pn(p1i),gs:s1,rs:s2}:{n:pn(p2i),gs:s2,rs:s1};
  return pn(p1i)+' (+'+s1+') vs '+pn(p2i)+' (+'+s2+') → '+giver.n+' gets '+(giver.gs-giver.rs)+' stroke'+(giver.gs-giver.rs>1?'s':'');
}

// ── Bet Math ──────────────────────────────────────────────────────────────────
function nassauHoles(p1,p2,from,to){
  // Returns {w1,w2,halved,complete} — hole-by-hole match play over holes [from..to]
  var net=NET(),w1=0,w2=0,halved=0;
  for(var h=from;h<=to;h++){
    var n1=net[p1][h],n2=net[p2][h];
    if(n1==null||n2==null)return{w1:w1,w2:w2,halved:halved,complete:false};
    if(n1<n2)w1++;else if(n2<n1)w2++;else halved++;
  }
  return{w1:w1,w2:w2,halved:halved,complete:true};
}
function nassauCalc(){
  if(!BT.nassau.on)return null;
  var r={};ais().forEach(function(i){r[i]=0;});
  BT.nassau.mus.forEach(function(mu){
    var p1=mu.p1,p2=mu.p2;if(!P[p1]||!P[p1].on||!P[p2]||!P[p2].on)return;
    [[0,8,+mu.front],[9,17,+mu.back],[0,17,+mu.tot]].forEach(function(seg){
      var res=nassauHoles(p1,p2,seg[0],seg[1]);
      if(!res.complete)return;
      if(res.w1>res.w2){r[p1]+=seg[2];r[p2]-=seg[2];}
      else if(res.w2>res.w1){r[p2]+=seg[2];r[p1]-=seg[2];}
      // equal holes won = push, no money moves
    });
  });
  return r;
}
function nassauLiveState(p1,p2,from,to){
  var net=NET(),w1=0,w2=0,played=0;
  for(var h=from;h<=to;h++){var n1=net[p1][h],n2=net[p2][h];if(n1==null||n2==null)continue;played++;if(n1<n2)w1++;else if(n2<n1)w2++;}
  var total=to-from+1,remaining=total-played,diff=w1-w2;
  return{w1:w1,w2:w2,played:played,remaining:remaining,diff:diff,closed:played>0&&Math.abs(diff)>remaining};
}
function fmtLiveState(st,p1n,p2n){
  if(st.played===0)return'<span style="color:#2a5030">—</span>';
  if(st.closed){var wn=st.diff>0?p1n:p2n;return'<span style="color:#30f858;font-weight:700">'+wn+' '+Math.abs(st.diff)+'&amp;'+st.remaining+'</span>';}
  if(st.diff===0)return'<span style="color:#7acc90">All Sq</span>';
  var wn=st.diff>0?p1n:p2n;
  return'<span style="color:#30f858">'+wn+' '+Math.abs(st.diff)+'UP</span>';
}
function buildNassauLiveHtml(){
  if(!BT.nassau.on)return'';
  var h='';
  BT.nassau.mus.forEach(function(mu){
    if(!P[mu.p1]||!P[mu.p1].on||!P[mu.p2]||!P[mu.p2].on)return;
    var p1n=pn(mu.p1),p2n=pn(mu.p2);
    var fS=nassauLiveState(mu.p1,mu.p2,0,8),bS=nassauLiveState(mu.p1,mu.p2,9,17),oS=nassauLiveState(mu.p1,mu.p2,0,17);
    h+='<div style="font-size:10px;color:#88c898;margin-bottom:3px">'+p1n+' <span style="color:#4a7050">vs</span> '+p2n;
    h+=' &nbsp;<span style="color:#4a7050">F('+fS.played+'):</span> '+fmtLiveState(fS,p1n,p2n);
    h+=' &nbsp;<span style="color:#4a7050">B('+bS.played+'):</span> '+fmtLiveState(bS,p1n,p2n);
    h+=' &nbsp;<span style="color:#4a7050">O('+oS.played+'):</span> '+fmtLiveState(oS,p1n,p2n);
    h+='</div>';
  });
  return h;
}
function updateNassauLive(){var el=document.getElementById('nassau-live');if(el)el.innerHTML=buildNassauLiveHtml();}
function matchCalc(){
  if(!BT.match.on)return null;
  var net=NET(),r={};ais().forEach(function(i){r[i]=0;});
  BT.match.mus.forEach(function(mu){
    var p1=mu.p1,p2=mu.p2,sk=+mu.stake;if(!P[p1]||!P[p1].on||!P[p2]||!P[p2].on)return;
    var run=0,played=0;C.forEach(function(_,hi){var n1=net[p1][hi],n2=net[p2][hi];if(n1==null||n2==null)return;played++;run+=n1<n2?1:n2<n1?-1:0;});
    var rem=18-played,abs=Math.abs(run);if((abs>rem&&played>0)||played===18){if(run!==0){var w=run>0?p1:p2;r[w]+=sk;r[w===p1?p2:p1]-=sk;}}
  });
  return r;
}
function wolfCalc(){
  var a=ais();if(!BT.wolf.on||a.length!==4)return null;
  var sk=+BT.wolf.stake,net=NET(),r={};a.forEach(function(i){r[i]=0;});
  C.forEach(function(_,hi){
    var wp=a[hi%4],oth=a.filter(function(i){return i!==wp;}),dec=WD[hi].dec;
    if(dec==null||a.some(function(i){return net[i][hi]==null;}))return;
    if(dec===-1){var ws=net[wp][hi],bo=Math.min.apply(null,oth.map(function(i){return net[i][hi];}));if(ws<bo){r[wp]+=sk*3;oth.forEach(function(i){r[i]-=sk;});}else if(ws>bo){r[wp]-=sk*3;oth.forEach(function(i){r[i]+=sk;});}}
    else{var wT=[wp,dec],oT=oth.filter(function(i){return i!==dec;});var wb=Math.min.apply(null,wT.map(function(i){return net[i][hi];})),ob=Math.min.apply(null,oT.map(function(i){return net[i][hi];}));if(wb<ob){wT.forEach(function(i){r[i]+=sk;});oT.forEach(function(i){r[i]-=sk;});}else if(ob<wb){wT.forEach(function(i){r[i]-=sk;});oT.forEach(function(i){r[i]+=sk;});}}
  });
  return r;
}
function init666Segs(){
  var a=ais();if(a.length!==4)return;
  BT.s666.segs=[{t1:[a[0],a[1]],t2:[a[2],a[3]]},{t1:[a[0],a[2]],t2:[a[1],a[3]]},{t1:[a[0],a[3]],t2:[a[1],a[2]]}];
}
function ensure666Segs(){
  var a=ais();if(a.length!==4)return;
  var segs=BT.s666.segs;
  if(!segs||segs.length!==3){init666Segs();return;}
  var flat=[];segs.forEach(function(s){flat=flat.concat(s.t1,s.t2);});
  if(!flat.every(function(pi){return a.indexOf(pi)!==-1;}))init666Segs();
}
function set666Team(si,slot,pi){
  ensure666Segs();

function s666Calc(){
  var a=ais();if(!BT.s666.on||a.length!==4)return null;
  ensure666Segs();
  var sk=+BT.s666.stake,net=NET(),r={};a.forEach(function(i){r[i]=0;});
  BT.s666.segs.forEach(function(seg,si){
    var t1=seg.t1,t2=seg.t2,hw=[0,0];
    for(var h=si*6;h<(si+1)*6;h++){
      if(t1.concat(t2).some(function(p){return net[p][h]==null;}))continue;
      var s1=net[t1[0]][h]+net[t1[1]][h],s2=net[t2[0]][h]+net[t2[1]][h];
      if(s1<s2)hw[0]++;else if(s2<s1)hw[1]++;
    }
    if(hw[0]>hw[1]){t1.forEach(function(p){r[p]+=sk;});t2.forEach(function(p){r[p]-=sk;});}
    else if(hw[1]>hw[0]){t2.forEach(function(p){r[p]+=sk;});t1.forEach(function(p){r[p]-=sk;});}
  });
  return r;
}
function s531Pts(){

  return pts;
}
function s531Calc(){

}
function p3cCalc(){
  if(!BT.p3c.on)return null;

  C.forEach(function(hole,hi){
    if(hole.par!==3)return;var cp=P3C[hi].cp,tp=P3C[hi].tp;
    if(cp==null||!P[cp]||!P[cp].on)return;
    var g=parseInt(GR[cp][hi]);if(isNaN(g))return;

    else if(diff===0){var b2=+BT.p3c.par;r[cp]+=b2*n;others.forEach(function(i){r[i]-=b2;});}
    else if(diff>=1&&tp){var c2=+BT.p3c.bogey;r[cp]-=c2*n;others.forEach(function(i){r[i]+=c2;});}
  });

}
function dotsCalc(){

function junkCalc(){

function betsTotal(){
  var a=ais(),t={};a.forEach(function(i){t[i]=0;});
  [nassauCalc(),matchCalc(),wolfCalc(),s666Calc(),s531Calc(),p3cCalc(),dotsCalc(),junkCalc()].forEach(function(res){if(res)a.forEach(function(i){t[i]+=(res[i]||0);});});
  return t;
}
function feesTotal(){
  var a=ais(),t={};a.forEach(function(i){t[i]=0;});
  var excl=RF.feeExclude||[];
  var paying=a.filter(function(i){return excl.indexOf(i)<0;});
  [[RF.roundPayer,+(RF.roundAmt)||0],[RF.bookPayer,+(RF.bookAmt)||0]].forEach(function(fee){
    var payer=fee[0],amt=fee[1];
    if(payer==null||amt<=0||paying.length===0)return;
    if(paying.indexOf(payer)<0)return; // payer is excluded — gifted players don't pay
    var share=amt/paying.length;
    paying.forEach(function(i){
      if(i===payer){t[i]+=amt-share;}  // payer recoups all others' shares
      else{t[i]-=share;}               // each non-excluded player owes their share
    });
  });
  return t;
}
function overall(){
  var bt=betsTotal(),ft=feesTotal(),a=ais(),t={};
  a.forEach(function(i){t[i]=(bt[i]||0)+(ft[i]||0);});
  return t;
}
function settleDebts(ov,a){
  var eps=0.4;
  var cr=a.filter(function(i){return ov[i]>eps;}).map(function(i){return{i:i,v:Math.round(ov[i])};}).sort(function(a,b){return b.v-a.v;});
  var db=a.filter(function(i){return ov[i]<-eps;}).map(function(i){return{i:i,v:-Math.round(ov[i])};}).sort(function(a,b){return b.v-a.v;});
  var tx=[];
  while(cr.length&&db.length){var c=cr[0],d=db[0],amt=Math.min(c.v,d.v);if(amt>0)tx.push({fr:d.i,to:c.i,amt:amt});c.v-=amt;d.v-=amt;if(c.v<eps)cr.shift();if(d.v<eps)db.shift();}
  return tx;
}

// ── Course Search — direct API call (or optional Cloudflare Worker proxy) ─────
async function apiFetch(proxyPath,directSuffix){
  if(PROXY_URL){
    var r=await fetch(PROXY_URL+proxyPath);
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.json();
  }
  var url=API_BASE+(directSuffix||proxyPath);
  // Try Bearer first (OAuth2 style)
  var r=await fetch(url,{headers:{'Authorization':'Bearer '+API_KEY,'Accept':'application/json'}});
  // If rejected, retry with x-api-key header (some API versions require this)
  if(r.status===401||r.status===403){
    r=await fetch(url,{headers:{'x-api-key':API_KEY,'Accept':'application/json'}});
  }
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

// Normalise a raw hole object to {n, par, hcp}; idx is 0-based array position fallback
function normalizeHole(h,idx){
  return{
    n:+(h.hole_number||h.Hole||h.hole||h.number||h.holeNumber||(idx+1)),
    par:+(h.Par||h.par||0),
    hcp:+(h.Handicap||h.handicap||h.stroke_index||h.strokeIndex||0)
  };
}

// Extract all tee sets from any golfcourseapi.com response shape
function extractTees(data){
  if(Array.isArray(data))return[{name:'Default',holes:data}];
  if(data.holes&&data.holes.length)return[{name:'Default',holes:data.holes}];
  if(data.scorecard&&data.scorecard.length)return[{name:'Default',holes:data.scorecard}];
  var c=data.course||data;
  if(c.tees){
    var sets=[];
    ['male','female'].forEach(function(gender){
      var grp=c.tees[gender];if(!Array.isArray(grp))return;
      grp.forEach(function(t){
        if(!t.holes||!t.holes.length)return;
        var nm=(t.tee_name||t.name||'Tee')+(gender==='female'?' ♀':'');
        sets.push({name:nm,holes:t.holes,rating:t.course_rating,slope:t.slope_rating});
      });
    });
    if(sets.length)return sets;
  }
  var flat=c.holes||c.scorecard;
  if(flat&&flat.length)return[{name:'Default',holes:flat}];
  return[];
}

function csSearch(q){
  clearTimeout(csTimer);
  var drop=document.getElementById('cs-drop');
  if(!q||q.length<2){if(drop)drop.style.display='none';return;}
  csTimer=setTimeout(async function(){
    var drop=document.getElementById('cs-drop');if(!drop)return;
    try{
      drop.innerHTML='<div style="font-size:10px;color:#4a7050;padding:8px 11px">Searching...</div>';
      drop.style.display='block';
      var data=await apiFetch('/search?q='+encodeURIComponent(q),'/search?search_query='+encodeURIComponent(q));
      var courses=Array.isArray(data)?data:(data.courses||data.data||[]);
      if(!courses.length){drop.innerHTML='<div style="font-size:10px;color:#4a7050;padding:8px 11px">No courses found.</div>';return;}
      // Cache full course objects so pickCourse can use tee data without a second API call
      courses.forEach(function(c){var id=c.id||c.course_id||c.courseId||'';if(id)courseCache[id]=c;});
      drop.innerHTML=courses.slice(0,12).map(function(c){
        var id=c.id||c.course_id||c.courseId||'';
        var rawName=c.club_name||c.courseName||c.name||'Unknown';
        var safeAttr=rawName.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
        var loc=c.location||{};
        var city=c.city||loc.city||'',state=c.state||loc.state||'';
        var locStr=[city,state].filter(Boolean).join(', ');
        var holes=c.number_of_holes||c.numberOfHoles||0;
        return'<div class="cri" onmousedown="pickCourse(\''+id+'\',\''+safeAttr+'\')">'
          +'<span style="color:#f0bf30">'+rawName+'</span>'
          +(locStr?'<span style="font-size:10px;color:#4a7050;margin-left:8px">'+locStr+'</span>':'')
          +(holes?'<span style="font-size:9px;color:#3a6040;margin-left:6px">'+holes+' holes</span>':'')
          +'</div>';
      }).join('');
      drop.style.display='block';
    }catch(e){
      var msg=e.message||'';
      var hint=(msg.indexOf('Failed to fetch')!==-1||msg.indexOf('NetworkError')!==-1)
        ?'CORS blocked — set PROXY_URL in the code to your Cloudflare Worker URL'
        :'Search error: '+msg;
      drop.innerHTML='<div style="font-size:10px;color:#ff8080;padding:8px 11px">'+hint+'</div>';
      drop.style.display='block';
    }
  },350);
}

async function pickCourse(id,rawName){
  var name=rawName.replace(/\\'/g,"'");
  cN=name;lastCourseId=id;courseTeeSets=[];courseTeeIdx=0;
  var inp=document.getElementById('cs-inp');if(inp)inp.value=name;
  var drop=document.getElementById('cs-drop');if(drop)drop.style.display='none';
  if(!id){render();return;}
  var statusEl=document.getElementById('cs-status');
  if(statusEl){statusEl.textContent='Loading scorecard...';statusEl.style.color='#4a7050';}
  try{
    var data=courseCache[id]||await apiFetch('/course/'+encodeURIComponent(id),'/courses/'+encodeURIComponent(id));
    var sets=extractTees(data);
    if(!sets.length)throw new Error('No scorecard data in response');
    courseTeeSets=sets;
    // Auto-pick: first male tee whose name matches common middle-tee keywords, else middle index
    var maleOnly=sets.filter(function(t){return t.name.indexOf('♀')===-1;});
    var src=maleOnly.length?maleOnly:sets;
    var prefer=['white','middle','medal','blue','regular','men'];
    var best=src[Math.floor((src.length-1)/2)];
    src.forEach(function(t){if(prefer.some(function(k){return(t.name||'').toLowerCase().indexOf(k)!==-1;}))best=t;});
    courseTeeIdx=sets.indexOf(best);
    applyTee(courseTeeIdx);
  }catch(e){
    if(statusEl){statusEl.textContent='Could not load scorecard: '+e.message;statusEl.style.color='#ff8080';}
    render();
  }
}

function hideCourseDrop(){setTimeout(function(){var d=document.getElementById('cs-drop');if(d)d.style.display='none';},150);}

function applyTee(idx){
  courseTeeIdx=idx;
  var tee=courseTeeSets[idx];if(!tee||!tee.holes)return;
  var loaded=0;
  tee.holes.forEach(function(raw,idx){
    var h=normalizeHole(raw,idx);
    if(h.n>=1&&h.n<=18&&h.par>=3&&h.par<=6){
      C[h.n-1].par=h.par;
      if(h.hcp>=1&&h.hcp<=18)C[h.n-1].hcp=h.hcp;
      loaded++;
    }
  });
  var statusEl=document.getElementById('cs-status');
  var teeName=tee.name+(tee.rating?' ('+tee.rating+(tee.slope?'/'+tee.slope:'')+')'  :'');
  if(loaded>=18){
    if(statusEl){statusEl.textContent='✓ '+cN+' · '+teeName+' · all 18 holes';statusEl.style.color='#60e030';}
    showN('✓ '+teeName+' scorecard loaded');
  }else if(loaded>0){
    if(statusEl){statusEl.textContent='⚠ '+teeName+' · '+loaded+'/18 holes — fill rest manually';statusEl.style.color='#f5a030';}
    showN('Partial: '+teeName+' ('+loaded+'/18)');
  }else{
    if(statusEl){statusEl.textContent='⚠ No hole data for '+teeName+' — enter pars manually';statusEl.style.color='#f5a030';}
  }
  render();
}

function setWolf(hi,dec){WD[hi].dec=WD[hi].dec===dec?null:dec;render();}
function selPly(pi,val){if(val==='__new__'){showNewP[pi]=true;render();return;}if(val){P[pi].name=val;var sg=sG.find(function(g){return g.name===val;});if(sg)P[pi].hcp=sg.hcp;}else P[pi].name='';render();}
function addPly(pi){var nm=document.getElementById('nnm'+pi),nh=document.getElementById('nnh'+pi);if(!nm)return;var name=nm.value.trim(),hcp=parseInt(nh?nh.value:10)||10;if(!name)return;P[pi].name=name;P[pi].hcp=hcp;showNewP[pi]=false;if(!sG.find(function(g){return g.name===name;})){sG.push({name:name,hcp:hcp});svG();}render();}

// Tab moves horizontally across the same player's holes — no DOM rebuild needed
function scTab(e,inp){
  if(e.key!=='Tab')return;
  e.preventDefault();
  var a=ais(),backward=e.shiftKey;
  var pi=+inp.getAttribute('data-pi'),hi=+inp.getAttribute('data-hi');
  var nx;
  if(backward){
    if(hi>0){nx=document.querySelector('.scinp[data-pi="'+pi+'"][data-hi="'+(hi-1)+'"]');}
    else{var ai=a.indexOf(pi);var pp=a[(ai-1+a.length)%a.length];nx=document.querySelector('.scinp[data-pi="'+pp+'"][data-hi="17"]');}
  }else{
    if(hi<17){nx=document.querySelector('.scinp[data-pi="'+pi+'"][data-hi="'+(hi+1)+'"]');}
    else{var ai=a.indexOf(pi);var np=a[(ai+1)%a.length];nx=document.querySelector('.scinp[data-pi="'+np+'"][data-hi="0"]');}
  }
  if(nx){nx.focus();nx.select();}
}

// Targeted cell update — updates one score cell in-place without rebuilding the table
function updateScoreCell(pi,hi){
  var net=NET();
  var g=parseInt(GR[pi][hi]);
  var nv=isNaN(g)?null:net[pi][hi];
  var hole=C[hi];
  var nc=nv!=null?sC(nv-hole.par):'rgba(245,237,213,.18)';
  var inp=document.querySelector('.scinp[data-pi="'+pi+'"][data-hi="'+hi+'"]');
  if(!inp)return;
  inp.style.background=nv!=null?nc+'22':'rgba(255,255,255,.04)';
  inp.style.borderColor=nv!=null?nc+'aa':'rgba(255,255,255,.12)';
  inp.style.color=nv!=null?nc:'#3a6040';
  var sp=inp.nextElementSibling;
  if(sp){sp.textContent=nv!=null?String(nv):'·';sp.style.color=nv!=null?nc:'#1a3820';}
  updateRowTotals(pi,hi<9?0:1);
  updateRowTotals(pi,2);
  updateNassauLive();
}

// Updates a gross/net total cell in-place. nine=0 front, nine=1 back, nine=2 full round
function updateRowTotals(pi,nine){
  var net=NET();
  var s=nine===2?0:nine*9,count=nine===2?18:9;
  var ns=net[pi].slice(s,s+count);
  var grs=GR[pi].slice(s,s+count).map(function(v){return parseInt(v);});
  var pTot=C.slice(s,s+count).reduce(function(a,h){return a+h.par;},0);
  var nTot=ns.every(function(v){return v!=null;})?ns.reduce(function(a,b){return a+b;},0):null;
  var gTot=grs.every(function(v){return!isNaN(v);})?grs.reduce(function(a,b){return a+b;},0):null;
  var tc=nTot!=null?sC(nTot-pTot):'#4a7050';
  var cell=document.querySelector('[data-tot-pi="'+pi+'"][data-tot-nine="'+nine+'"]');
  if(!cell)return;
  var spans=cell.querySelectorAll('span');
  if(spans[0])spans[0].textContent=gTot!=null?String(gTot):'—';
  if(spans[1]){spans[1].textContent=nTot!=null?String(nTot):'—';spans[1].style.color=tc;}
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  invalidateCalcCache();
  var root=document.getElementById('root');
  if(!loggedIn){root.innerHTML=rLogin();return;}
  var tabs=getTabs();
  var th=tabs.map(function(t){return'<button class="tab'+(TAB===t.id?' act':'')+'" onclick="setTab(\''+t.id+'\')">'+t.l+'</button>';}).join('');
  var body='';
  if(TAB==='setup')body=rSetup();
  else if(TAB==='scores')body=rScores();
  else if(TAB==='extras')body=rExtras();
  else if(TAB==='wolf')body=rWolf();
  else if(TAB==='results')body=rResults();
  else if(TAB==='flow')body=rFlow();
  else body=rHist();
  root.innerHTML='<div class="hdr"><div class="ttl">⛳ GOLF BET TRACKER'+(profile&&profile.name!=='Demo'?'<span style="font-size:10px;color:#3a6040;margin-left:14px;letter-spacing:1px">'+profile.name+'</span>':'')+'</div><div class="tabs">'+th+'</div></div><div class="bd">'+body+'</div>';
  var ntf=document.getElementById('ntf');if(ntf&&nM){ntf.textContent=nM;ntf.className='ntf on';}
}

ldAll().then(function(){if(profile)loggedIn=true;render();});
</script>
